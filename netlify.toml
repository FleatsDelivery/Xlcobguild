# Netlify Configuration for The Corn Field
# This file tells Netlify how to build and deploy your React + Vite app

[build]
  # Build command: compile React app with Vite
  command = "npm run build"
  
  # Publish directory: where Vite outputs the built files
  publish = "dist"
  
  # Node version (match your local development)
  node_version = "20"

# Redirect all routes to index.html for client-side routing
# This is crucial for hash-based routing to work
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache static assets (images, fonts, etc.)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment variables (set these in Netlify dashboard)
# SUPABASE_URL = https://zizrvkkuqzwzxgwpuvxb.supabase.co
# SUPABASE_ANON_KEY = (your public anon key)
# Note: SUPABASE_SERVICE_ROLE_KEY stays in Supabase Edge Functions only
